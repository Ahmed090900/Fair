    // --- State Manager ---
    const app = {
        state: {
            user: { username: 'Alex.Pi', balance: 1240.85, points: 2450, level: 'Bronze' },
            isPremium: false,
            currentView: 'home',
            history: []

        init() {
            // Load from localStorage
            const saved = localStorage.getItem('fair_state');
            if (saved) this.state = JSON.parse(saved);
            
            this.initPi();
            this.switchView('home');
        },

        save() {
            localStorage.setItem('fair_state', JSON.stringify(this.state));
        },

        async initPi() {
            try {
                // Pi SDK 2.0 Initialization
                const Pi = window.Pi;
                if (Pi) {
                    await Pi.init({ version: "2.0", sandbox: true });
                    const scopes = ['username', 'payments'];
                    const onIncompletePaymentFound = (payment) => { /* Handle incomplete */ };
                    const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                    if (auth) {
                        this.state.user.username = auth.user.username;
                        this.save();
                        this.updateUI();
                    }
                }
            } catch (err) {
                console.warn("Pi SDK init failed or not in Pi Browser", err);
            }
        },

        updateUI() {
            document.getElementById('user-avatar').src = 'https://lh3.googleusercontent.com/aida-public/AB6AXuC7_Y14UVMU9MQGpXqHXgbfvOJyYB2trhZPzWoM-x1Q7MfoyoBlMYn8uowuQR3A42ZZJP7Z05NbPaoTwnpKvkLRg4znwzEvMODhekzo6MVF-Z5EiY9SI6MqiVHLFtk6mFNQzVUfwUVxWw4Rpls54nglyL7nk-uNYr5ID0iLo46iCviz69RJgXeg16RR7pXNAvdRLi3Y4livuAJ-LHtXOPcF5P4dD3GGdWOczsLz3wBwFwIFISDyYc7SnflxaRC-9B5ZorZh6Dg42kg';
        },

        showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            const message = document.getElementById('toast-message');
            message.innerText = msg;
            toast.classList.remove('opacity-0', 'translate-y-[-20px]');
            toast.classList.add('opacity-100', 'translate-y-0');
            if (isError) toast.classList.add('border-error/40');
            else toast.classList.remove('border-error/40');
            
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-[-20px]');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 3000);
        },

        async buyItem(itemId, amount) {
            this.showToast("Initializing Payment...");
            try {
                const Pi = window.Pi;
                if (!Pi) throw new Error("Pi SDK not available");

                const payment = await Pi.createPayment({
                    amount: amount,
                    memo: `Purchase for Item #${itemId}`,
                    metadata: { itemId: itemId }
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        // Simulated endpoint
                        return fetch('/api/approve', { method: 'POST', body: JSON.stringify({ paymentId }) });
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        // Simulated endpoint
                        return fetch('/api/complete', { method: 'POST', body: JSON.stringify({ paymentId, txid }) });
                    },
                    onCancel: (paymentId) => this.showToast("Payment Cancelled"),
                    onError: (error, payment) => this.showToast("Payment Error", true),
                });

                // Success logic
                this.addPoints(amount * 10);
                this.state.history.push({ date: new Date().toLocaleDateString(), item: itemId, amount });
                this.state.user.balance -= amount;
                this.save();
                this.showToast("Success! Item purchased.");
                this.switchView('home');
            } catch (err) {
                // Fallback for demo
                this.addPoints(amount * 10);
                this.state.user.balance -= amount;
                this.save();
                this.showToast("Demo: Purchase successful!");
                this.switchView('home');
            }
        },

        upgradePremium() {
            if (this.state.isPremium) return this.showToast("Already Premium!");
            this.buyItem('PREMIUM', 1.0);
            this.state.isPremium = true;
            this.save();
        },

        addPoints(pts) {
            this.state.user.points += Math.round(pts);
            if (this.state.user.points > 10000) this.state.user.level = 'Diamond';
            else if (this.state.user.points > 5000) this.state.user.level = 'Platinum';
            else if (this.state.user.points > 2000) this.state.user.level = 'Gold';
            this.save();
        },

        switchView(viewId) {
            const container = document.getElementById('app-content');
            container.style.opacity = '0';
            
            setTimeout(() => {
                this.state.currentView = viewId;
                this.renderView(viewId);
                this.updateNav(viewId);
                container.style.opacity = '1';
                window.scrollTo(0,0);
            }, 300);
        },

        updateNav(viewId) {
            document.querySelectorAll('.nav-item').forEach(el => {
                const v = el.getAttribute('data-view');
                if (v === viewId) {
                    el.classList.add('bg-gradient-to-br', 'from-primary/20', 'to-secondary/20', 'text-[#dee5ff]', 'rounded-[1.5rem]', 'shadow-[inset_0_1px_1px_rgba(255,255,255,0.1)]');

                    el.querySelector('.material-symbols-outlined').style.fontVariationSettings = "'FILL' 1";
                } else {
                    el.classList.remove('bg-gradient-to-br', 'from-primary/20', 'to-secondary/20', 'text-[#dee5ff]', 'rounded-[1.5rem]', 'shadow-[inset_0_1px_1px_rgba(255,255,255,0.1)]');

                    el.querySelector('.material-symbols-outlined').style.fontVariationSettings = "'FILL' 0";

                                    <span class="font-label text-xs font-bold text-on-surface">${this.state.user.level} Tier</span>
