<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAIR - Smart Deal Finder</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:600px;
margin:auto;
}

input{
width:80%;
padding:12px;
border-radius:8px;
border:none;
margin:10px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#6366f1;
color:white;
cursor:pointer;
margin:10px;
}

.result{
background:#1e293b;
padding:15px;
margin:10px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>FAIR</h1>
<p>Find Affordable Intelligent Recommendations</p>

<button onclick="login()">Login with Pi</button>

<hr>

<h2>Search Deals</h2>

<input id="search" placeholder="Search flights, products, hotels">

<br>

<button onclick="search()">Search</button>

<div id="results"></div>

<hr>

<h2>Premium</h2>

<p>Unlock AI recommendations</p>

<button onclick="subscribe()">Subscribe - 1 Pi</button>

</div>

<script>

Pi.init({ version: "2.0" });

let user = null;

async function login(){

try{

const scopes = ['username','payments'];

user = await Pi.authenticate(scopes);

alert("Welcome " + user.user.username);

}catch(e){
console.error(e);
}

}

function search(){

let query = document.getElementById("search").value;

let results = document.getElementById("results");

results.innerHTML = "";

let fakeResults = [

{name:"Flight Cairo → Dubai",price:120,rating:4.5},

{name:"Hotel Dubai Marina",price:80,rating:4.2},

{name:"iPhone Deal",price:900,rating:4.8}

];

fakeResults.forEach(item=>{

results.innerHTML += `
<div class="result">
<h3>${item.name}</h3>
<p>Price: $${item.price}</p>
<p>Rating: ⭐ ${item.rating}</p>
</div>
`;

});

}

function subscribe(){

const paymentData = {

amount:1,

memo:"FAIR Premium",

metadata:{type:"premium"}

};

const callbacks = {

onReadyForServerApproval: function(paymentId){

fetch("/api/approve",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({paymentId})

});

},

onReadyForServerCompletion: function(paymentId,txid){

fetch("/api/complete",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

paymentId:paymentId,

txid:txid

})

});

},

onCancel: function(paymentId){

alert("Payment cancelled");

},

onError: function(error, payment){

console.error(error);

}

};

Pi.createPayment(paymentData,callbacks);

}

</script>

</body>
  </html>
