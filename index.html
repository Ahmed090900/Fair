<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fair - منصة التجارة العادلة</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #facc15;
            --primary-hover: #eab308;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #3b82f6;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Splash Screen */
        #splash {
            position: fixed;
            inset: 0;
            background: #020617;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid var(--card-bg);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-top: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-size: 1.8rem; font-weight: 800; color: var(--primary); letter-spacing: -1px; }

        /* Search & Filters */
        .search-container {
            padding: 20px 5%;
            background: linear-gradient(to bottom, rgba(15, 23, 42, 1), transparent);
        }
        .search-box {
            position: relative;
            max-width: 600px;
            margin: 0 auto 20px;
        }
        input#searchInput {
            width: 100%;
            padding: 15px 25px;
            border-radius: 30px;
            border: 2px solid #334155;
            background: #1e293b;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
        }
        input#searchInput:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 15px rgba(250, 204, 21, 0.1); }

        .filter-tags {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .tag {
            padding: 8px 20px;
            border-radius: 20px;
            background: #334155;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.9rem;
            border: 1px solid transparent;
        }
        .tag:hover, .tag.active { background: var(--primary); color: #000; font-weight: 600; }

        /* Grid & Cards */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px 5% 100px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.03);
        }
        .card:hover { transform: translateY(-8px); border-color: rgba(250, 204, 21, 0.3); }

        .card-img-wrapper { position: relative; height: 220px; overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover img { scale: 1.1; }

        .favorite-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            color: white;
            transition: 0.3s;
        }
        .favorite-btn.active { color: #ef4444; background: white; }

        .card-body { padding: 1.2rem; }
        .card-body h4 { margin-bottom: 10px; font-size: 1.1rem; }
        .price-tag { color: var(--primary); font-size: 1.4rem; font-weight: 800; display: flex; align-items: center; gap: 5px; }

        /* Modal Modernization */
        #productModal {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-content {
            background: #1e293b;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            border-radius: 30px;
            overflow-y: auto;
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Buttons */
        .btn-main {
            background: var(--primary);
            color: #000;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-main:hover { background: var(--primary-hover); transform: scale(1.02); }

        /* Toast Notification */
        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #22c55e;
            color: white;
            padding: 16px 30px;
            border-radius: 16px;
            font-weight: 600;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 5000;
            animation: slideIn 0.4s forwards;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

    </style>
</head>
<body>

    <div id="splash">
        <div style="font-size: 3rem; font-weight: 800; color: var(--primary);">Fair</div>
        <div style="color: var(--text-dim);">تسوق بأمان باستخدام عملة Pi</div>
        <div class="loader"></div>
    </div>

    <header>
        <div class="logo">✨ Fair</div>
        <div id="authArea">
            <button id="loginBtn" class="btn-main" onclick="login()">دخول</button>
            <button id="logoutBtn" class="btn-main" style="display:none; background:#334155; color:white;" onclick="logout()">خروج</button>
        </div>
    </header>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="ابحث عن سيارة، هاتف، أو عقار..." oninput="search(this.value)">
        </div>
        <div class="filter-tags">
            <div class="tag active" onclick="filter('all', this)">الكل</div>
            <div class="tag" onclick="filter('car', this)">سيارات</div>
            <div class="tag" onclick="filter('home', this)">عقارات</div>
            <div class="tag" onclick="filter('phone', this)">جوالات</div>
        </div>
    </div>

    <div class="grid" id="products"></div>

    <div id="productModal" onclick="if(event.target === this) closeModal()">
        <div class="modal-content">
            <div id="modalBody"></div>
        </div>
    </div>

    <div id="toast"></div>

<script>
// البيانات الأساسية
const allProducts = [
    { id: 1, type: "car", title: "BMW X5 2022", price: 2.8, img: "https://images.unsplash.com/photo-1555215695-3004980ad54e", location: "مسقط", condition: "ممتازة", desc: "سيارة فاخرة بحالة الوكالة، تقنيات متطورة ومحرك قوي." },
    { id: 2, type: "car", title: "Mercedes C300", price: 3.2, img: "https://images.unsplash.com/photo-1619767886558-efdc259cde1a", location: "دبي", condition: "جديدة", desc: "مرسيدس بنز الفئة C، تصميم رياضي وأداء استثنائي." },
    { id: 3, type: "home", title: "شقة مودرن 3 غرف", price: 4.5, img: "https://images.unsplash.com/photo-1568605114967-8130f3a36994", location: "الرياض", condition: "جاهزة", desc: "إطلالة بانورامية وتصميم داخلي ذكي." },
    { id: 5, type: "phone", title: "iPhone 16 Pro", price: 1.1, img: "https://images.unsplash.com/photo-1724177807530-0c2c8c8c8c8c", location: "الكويت", condition: "تغليف المصنع", desc: "أحدث إصدارات آيفون مع ميزات الذكاء الاصطناعي." }
];

let favorites = JSON.parse(localStorage.getItem("fair_favs")) || [];
let currentUser = null;

// تهيئة Pi SDK
async function initPi() {
    try {
        if (window.Pi) {
            await window.Pi.init({ version: "2.0", sandbox: true });
        }
    } catch (e) { console.error("Pi SDK error:", e); }
}

// عرض المنتجات
function renderProducts(products) {
    const container = document.getElementById("products");
    container.innerHTML = products.map(p => `
        <div class="card" onclick="showProduct(${p.id})">
            <div class="card-img-wrapper">
                <button class="favorite-btn ${favorites.includes(p.id) ? 'active' : ''}" 
                        onclick="event.stopPropagation(); toggleFav(${p.id})">
                    ❤
                </button>
                <img src="${p.img}" alt="${p.title}">
            </div>
            <div class="card-body">
                <h4>${p.title}</h4>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div class="price-tag"><span>π</span>${p.price}</div>
                    <small style="color:var(--text-dim)">${p.location}</small>
                </div>
            </div>
        </div>
    `).join('');
}

// البحث والفلترة
function search(val) {
    const filtered = allProducts.filter(p => p.title.toLowerCase().includes(val.toLowerCase()));
    renderProducts(filtered);
}

function filter(type, el) {
    document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    if(type === 'all') renderProducts(allProducts);
    else renderProducts(allProducts.filter(p => p.type === type));
}

// تفاصيل المنتج
function showProduct(id) {
    const p = allProducts.find(item => item.id === id);
    const modal = document.getElementById("productModal");
    const body = document.getElementById("modalBody");

    body.innerHTML = `
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));">
            <img src="${p.img}" style="width:100%; height:400px; object-fit:cover;">
            <div style="padding:40px; display:flex; flex-direction:column; gap:20px;">
                <h2 style="font-size:2rem;">${p.title}</h2>
                <div class="price-tag" style="font-size:2.5rem;">π ${p.price}</div>
                <p style="color:var(--text-dim); line-height:1.6;">${p.desc}</p>
                <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:15px;">
                    <div>📍 الموقع: ${p.location}</div>
                    <div>🛠 الحالة: ${p.condition}</div>
                </div>
                <button class="btn-main" style="margin-top:auto; padding:18px;" onclick="handleBuy(${p.id}, ${p.price})">
                    تأكيد الشراء بـ Pi
                </button>
                <button onclick="closeModal()" style="background:transparent; border:none; color:var(--text-dim); cursor:pointer;">إغلاق</button>
            </div>
        </div>
    `;
    modal.style.display = "flex";
}

function closeModal() { document.getElementById("productModal").style.display = "none"; }

// نظام الدفع (تجريبي)
async function handleBuy(id, amount) {
    if(!currentUser) {
        showToast("يرجى تسجيل الدخول أولاً");
        return;
    }
    showToast("جاري تحويلك لمحفظة Pi...");
    // هنا يتم استدعاء Pi.createPayment
}

// المفضلة
function toggleFav(id) {
    if(favorites.includes(id)) favorites = favorites.filter(f => f !== id);
    else favorites.push(id);
    localStorage.setItem("fair_favs", JSON.stringify(favorites));
    renderProducts(allProducts);
}

// تسجيل الدخول
async function login() {
    try {
        const auth = await window.Pi.authenticate(['username']);
        currentUser = auth.user;
        document.getElementById("loginBtn").style.display = "none";
        document.getElementById("logoutBtn").style.display = "block";
        showToast(`أهلاً بك، ${currentUser.username}`);
    } catch (e) { showToast("فشل الاتصال بـ Pi Browser"); }
}

function logout() {
    currentUser = null;
    document.getElementById("loginBtn").style.display = "block";
    document.getElementById("logoutBtn").style.display = "none";
    showToast("تم تسجيل الخروج");
}

function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.style.display = "block";
    setTimeout(() => t.style.display = "none", 3000);
}

// بدء التشغيل
window.onload = () => {
    setTimeout(() => {
        document.getElementById("splash").style.opacity = "0";
        setTimeout(() => document.getElementById("splash").style.display = "none", 600);
    }, 1500);
    
    initPi();
    renderProducts(allProducts);
};
</script>
</body>
</html>
