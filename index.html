<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAIR | محرك البحث العادل الذكي</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap');
        body { 
            font-family: 'Cairo', sans-serif; 
            background: radial-gradient(circle at top right, #1e1b4b 0%, #0f172a 100%);
            color: white;
            overflow-x: hidden;
        }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .active-tab { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%) !important; color: white !important; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }
        .search-input:focus { box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); }
        .btn-glow:hover { box-shadow: 0 0 25px rgba(168, 85, 247, 0.6); transform: translateY(-2px); }
        .pi-badge { background: linear-gradient(90deg, #ffeb3b, #fbc02d); color: #000; font-weight: 900; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="p-5 flex justify-between items-center glass sticky top-0 z-[100] animate__animated animate__fadeInDown">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center font-black text-xl shadow-lg rotate-3">F</div>
            <span class="text-2xl font-black tracking-widest uppercase italic bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">FAIR</span>
        </div>
        <div id="user-info" class="text-xs font-bold text-indigo-300 bg-indigo-900/30 px-4 py-2 rounded-full border border-indigo-500/30">
            جاري تهيئة Pi...
        </div>
    </nav>

    <header class="py-12 px-6 text-center animate__animated animate__zoomIn">
        <h1 class="text-5xl md:text-7xl font-black mb-6 leading-tight">
            مساعدك <span class="text-indigo-500 italic">الذكي</span> <br>لأفضل الصفقات
        </h1>
        <p class="text-slate-400 text-lg md:text-xl max-w-2xl mx-auto mb-10">
            قارن الأسعار لحظياً في الطيران، الفنادق، وحتى الخدمات الطبية. ادفع بـ Pi واحصل على مميزات حصرية.
        </p>

        <div class="max-w-5xl mx-auto glass p-4 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
            <div class="absolute -top-24 -left-24 w-48 h-48 bg-indigo-600/20 blur-[100px]"></div>

            <div class="flex overflow-x-auto gap-3 p-2 no-scrollbar mb-6 scroll-smooth">
                <button onclick="setTab('hotels', this)" class="active-tab flex items-center gap-3 px-8 py-4 rounded-2xl bg-slate-800 text-slate-400 font-bold transition-all shrink-0">
                    <i data-lucide="hotel"></i> فنادق
                </button>
                <button onclick="setTab('flights', this)" class="flex items-center gap-3 px-8 py-4 rounded-2xl bg-slate-800 text-slate-400 font-bold transition-all shrink-0">
                    <i data-lucide="plane"></i> طيران
                </button>
                <button onclick="setTab('cars', this)" class="flex items-center gap-3 px-8 py-4 rounded-2xl bg-slate-800 text-slate-400 font-bold transition-all shrink-0">
                    <i data-lucide="car"></i> سيارات
                </button>
                <button onclick="setTab('realestate', this)" class="flex items-center gap-3 px-8 py-4 rounded-2xl bg-slate-800 text-slate-400 font-bold transition-all shrink-0">
                    <i data-lucide="home"></i> عقارات
                </button>
                <button onclick="setTab('medical', this)" class="flex items-center gap-3 px-8 py-4 rounded-2xl bg-slate-800 text-slate-400 font-bold transition-all shrink-0">
                    <i data-lucide="heart-pulse"></i> طبي
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-12 gap-4 p-2">
                <div class="md:col-span-8 relative">
                    <input id="searchInput" type="text" placeholder="ماذا تريد أن تبحث عنه اليوم؟" 
                    class="search-input w-full bg-slate-900/50 border border-slate-700 p-5 rounded-3xl outline-none text-xl transition-all">
                </div>
                <button onclick="startSearch()" class="md:col-span-4 btn-glow bg-gradient-to-r from-indigo-600 to-purple-600 p-5 rounded-3xl font-black text-xl flex items-center justify-center gap-3 transition-all duration-300">
                    <i data-lucide="search"></i> بحث عادل
                </button>
            </div>
        </div>
    </header>

    <main id="main-view" class="max-w-5xl mx-auto px-6 pb-24">
        
        <div id="upgrade-card" class="glass p-8 rounded-[2rem] border-indigo-500/30 flex flex-col md:flex-row justify-between items-center gap-6 animate__animated animate__fadeInUp">
            <div class="text-right">
                <span class="pi-badge px-3 py-1 rounded-md text-[10px] uppercase mb-2 inline-block">عضوية FAIR+</span>
                <h3 class="text-2xl font-black mb-2">فعل محرك البحث الكامل</h3>
                <p class="text-slate-400 text-sm">احصل على وصول لـ 100+ مصدر عالمي وقارن الأسعار بدقة 100%.</p>
            </div>
            <button id="pay-btn" onclick="startPiProcess()" class="bg-white text-black px-10 py-5 rounded-3xl font-black hover:scale-105 transition-all flex items-center gap-2" disabled>
                <span class="text-xs">ادفع الآن</span> 1.0 π
            </button>
        </div>

        <div id="results-area" class="mt-12 hidden animate__animated animate__fadeIn">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-2xl font-black flex items-center gap-2">
                    <span class="w-2 h-8 bg-indigo-500 rounded-full"></span> 
                    أفضل عروض <span id="current-cat-text" class="text-indigo-400">الفنادق</span>
                </h2>
                <span class="text-xs text-green-400 animate-pulse">● تحديث مباشر للأسعار</span>
            </div>
            <div id="results-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const payBtn = document.getElementById('pay-btn');
        const userInfo = document.getElementById('user-info');
        let currentUser = null;

        // --- تهيئة Pi Network ---
        async function initPi() {
            try {
                if (typeof Pi === 'undefined') throw new Error("افتح التطبيق في Pi Browser");
                await Pi.init({ version: "2.0", sandbox: true });
                const auth = await Pi.authenticate(['username', 'payments'], onIncompletePaymentFound);
                currentUser = auth.user;
                payBtn.disabled = false;
                userInfo.innerText = "مرحباً: " + currentUser.username;
            } catch (err) {
                userInfo.innerText = "وضع الزائر (يرجى استخدام Pi Browser)";
                userInfo.classList.add('text-red-400');
            }
        }

        function setTab(category, btn) {
            document.querySelectorAll('button').forEach(b => b.classList.remove('active-tab'));
            btn.classList.add('active-tab');
            const catNames = { 'hotels': 'فنادق', 'flights': 'طيران', 'cars': 'سيارات', 'realestate': 'عقارات', 'medical': 'خدمات طبية' };
            document.getElementById('searchInput').placeholder = `ابحث عن ${catNames[category]}...`;
            document.getElementById('current-cat-text').innerText = catNames[category];
        }

        function startSearch() {
            const grid = document.getElementById('results-grid');
            document.getElementById('results-area').classList.remove('hidden');
            grid.innerHTML = `<div class="col-span-full py-20 text-center animate-pulse text-indigo-300">جارٍ فحص قواعد البيانات العالمية...</div>`;
            
            setTimeout(() => {
                grid.innerHTML = `
                    <div class="glass p-6 rounded-3xl border-l-8 border-indigo-500 hover:bg-white/5 transition-all animate__animated animate__fadeInLeft">
                        <div class="flex justify-between items-start mb-4">
                            <h4 class="font-black text-xl">عرض "Fair" الحصري</h4>
                            <span class="bg-green-500/20 text-green-400 text-[10px] px-2 py-1 rounded">الأقل سعراً</span>
                        </div>
                        <p class="text-slate-400 text-sm mb-6 font-bold">هذا السعر متاح فقط لمستخدمي Pi Network لفترة محدودة.</p>
                        <div class="flex justify-between items-end">
                            <div>
                                <span class="text-xs text-slate-500 line-through block italic">1.2 Pi</span>
                                <span class="text-3xl font-black text-white">0.8 <small class="text-xs font-normal">π</small></span>
                            </div>
                            <button class="bg-indigo-600 px-6 py-3 rounded-2xl text-xs font-black shadow-lg shadow-indigo-500/40">احجز الآن</button>
                        </div>
                    </div>
                `;
            }, 1500);
        }

        async function startPiProcess() {
            // كود الدفع الخاص بك (الذي أرسلته سابقاً) مدمج هنا
            try {
                payBtn.innerText = "جاري الاتصال بالمحفظة...";
                const payment = await Pi.createPayment({
                    amount: 1.0,
                    memo: "ترقية تطبيق FAIR للمستوى الاحترافي",
                    metadata: { type: "premium_upgrade" }
                }, {
                    onReadyForServerApproval: (id) => console.log("Approved", id),
                    onReadyForServerCompletion: (id, tx) => {
                        alert("🎉 تم الترقية بنجاح!");
                        payBtn.innerText = "تم التفعيل ✅";
                        document.getElementById('upgrade-card').classList.add('border-green-500');
                    },
                    onCancel: () => payBtn.innerText = "ادفع الآن 1.0 π",
                    onError: (err) => alert("خطأ: " + err.message)
                });
            } catch (err) { console.error(err); }
        }

        function onIncompletePaymentFound(p) { console.log("Payment found", p); }
        window.onload = initPi;
    </script>
</body>
</html>
