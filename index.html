<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fair App</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background: radial-gradient(circle at center, #2e1a47, #1a1a2e);
    color:white;
}

.container {
    max-width:420px;
    margin:auto;
    padding:20px;
}

.card {
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(15px);
    border-radius:25px;
    padding:25px;
    box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

input {
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    margin-top:10px;
}

.btn {
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#6200ea,#b388ff);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.result {
    background:#222;
    padding:15px;
    border-radius:12px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>Fair 🔍</h2>
<p>Find the best deals instantly</p>

<input id="search" placeholder="Search for products, flights, hotels...">

<button class="btn" onclick="searchDeals()">Search</button>

<div id="results"></div>

<div id="paymentBox" style="display:none;">
    <h3>Best Deal 🎉</h3>
    <p id="selectedItem"></p>

    <button class="btn" onclick="startPayment()">Pay with Pi</button>
</div>

<p id="status"></p>

</div>
</div>

<script>
let selectedDeal = null;

// 🔍 Fake Search (تقدر تربطه API بعدين)
function searchDeals() {
    const results = document.getElementById("results");

    results.innerHTML = `
        <div class="result">
            📱 iPhone 13 - $700 <br>
            ⭐ Amazon
            <br><br>
            <button class="btn" onclick="selectDeal('iPhone 13 - $700')">Choose</button>
        </div>

        <div class="result">
            📱 iPhone 13 - $680 🔥 <br>
            ⭐ Best Deal
            <br><br>
            <button class="btn" onclick="selectDeal('Best Deal iPhone 13 - $680')">Choose</button>
        </div>
    `;
}

// 📊 اختيار عرض
function selectDeal(item) {
    selectedDeal = item;

    document.getElementById("paymentBox").style.display = "block";
    document.getElementById("selectedItem").innerText = item;
}

// 💳 الدفع باستخدام Pi
async function startPayment() {
    try {
        if (!window.Pi) {
            alert("Open in Pi Browser");
            return;
        }

        Pi.init({ version: "2.0", sandbox: true });

        await Pi.authenticate(['username', 'payments']);

        await Pi.createPayment({
            amount: 1,
            memo: "Purchase via Fair",
            metadata: { item: selectedDeal }
        }, {
            onReadyForServerApproval: (id) => {
                return fetch('/api/approve', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({ paymentId:id })
                });
            },
            onReadyForServerCompletion: (id, txid) => {
                return fetch('/api/complete', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({ paymentId:id, txid })
                });
            },
            onCancel: () => alert("Payment cancelled"),
            onError: (err) => alert(err.message)
        });

        document.getElementById("status").innerText = "✅ Payment successful";

    } catch(e) {
        alert(e.message);
    }
}
</script>

</body>
</html>
