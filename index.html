<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fair - منصة التجارة العادلة</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #facc15;
    --dark-bg: #0f172a;
    --card-bg: #1e293b;
    --text-main: #f8fafc;
    --accent-success: #22c55e;
}
* { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo',sans-serif; }
body { background-color: var(--dark-bg); color: var(--text-main); min-height:100vh; }

/* Header */
header {
    display:flex; justify-content:space-between; align-items:center;
    padding:1rem 5%; background:rgba(15,23,42,0.9);
    backdrop-filter: blur(10px); position:sticky; top:0; z-index:1000;
    border-bottom:1px solid rgba(255,255,255,0.05);
}
.logo { font-size:1.8rem; font-weight:800; color: var(--primary); }

/* Controls */
.controls { padding:20px 5%; text-align:center; }
input#searchInput {
    width:100%; max-width:500px; padding:12px 20px;
    border-radius:25px; border:2px solid #334155;
    background:#1e293b; color:white; margin-bottom:15px;
}

/* Grid */
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; padding:0 5% 50px; }
.card {
    background: var(--card-bg); border-radius:20px; overflow:hidden;
    transition:0.3s; cursor:pointer; border:1px solid transparent;
}
.card:hover { transform: translateY(-5px); border-color: var(--primary); }
.card img { width:100%; height:200px; object-fit:cover; transition: transform 0.3s ease; }
.card:hover img { transform: scale(1.05); }
.card-content { padding:15px; }

/* Modal */
#productModal {
    position:fixed; inset:0; background: rgba(0,0,0,0.8);
    display:none; align-items:center; justify-content:center; z-index:2000;
}
.modal-box {
    background:#1e293b; width:90%; max-width:800px;
    border-radius:25px; overflow:hidden; position:relative;
    animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from {opacity:0; transform: translateY(-20px);} to {opacity:1; transform:translateY(0);} }

/* Buttons */
.btn-pay {
    background: var(--primary); color:#000; width:100%;
    padding:15px; border:none; border-radius:12px;
    font-weight:700; font-size:1.1rem; cursor:pointer;
}

#toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--accent-success); color: white; padding: 12px 25px;
    border-radius: 10px; display: none; z-index: 3000;
}
</style>
</head>
<body>
<header>
    <div class="logo">Fair</div>
    <div id="userProfile">
        <button id="loginBtn" onclick="login()" style="background:var(--primary); border:none; padding:8px 20px; border-radius:10px; font-weight:700; cursor:pointer;">دخول</button>
    </div>
</header>

<div class="controls">
    <input type="text" id="searchInput" placeholder="ابحث عن منتج..." oninput="search(this.value)">
</div>

<div class="grid" id="productsGrid"></div>

<div id="productModal" onclick="if(event.target===this) closeModal()">
    <div class="modal-box" id="modalContent"></div>
</div>

<div id="toast"></div>

<script src="approve.js"></script>
<script src="complete.js"></script>

<script>
// بيانات المنتجات
const products = [
    { id: 101, title: "iPhone 15 Pro", price: 0.85, img: "https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-15-pro-gold-select?wid=940&hei=1112&fmt=png-alpha&.v=1695171218574", desc: "نسخة 256 جيجا، حالة ممتازة." },
    { id: 102, title: "Tesla Model 3", price: 1500, img: "https://images.unsplash.com/photo-1560958089-b8a1929cea89?w=500", desc: "موديل 2023، دفع كلي." },
    { id: 103, title: "MacBook Air M2", price: 1.2, img: "https://images.unsplash.com/photo-1611186871348-b1ce696e52c9?w=500", desc: "رام 16 جيجا، لون رمادي فضائي." }
];

let currentUser = null;

// تهيئة Pi SDK
async function initPi(){
    try { await window.Pi.init({ version:"2.0", sandbox:true }); console.log("Pi SDK Initialized"); }
    catch(e){ console.error(e); }
}

// عرض المنتجات
function render(items){
    const grid = document.getElementById("productsGrid");
    grid.innerHTML = items.map(p => `
        <div class="card" onclick="showDetails(${p.id})">
            <img src="${p.img}">
            <div class="card-content">
                <h3>${p.title}</h3>
                <p style="color:var(--primary); font-weight:bold; font-size:1.2rem;">π ${p.price}</p>
            </div>
        </div>
    `).join('');
}

// فتح الـ Modal
function showDetails(id){
    document.body.style.overflow="hidden";
    const p = products.find(x => x.id===id);
    const modal = document.getElementById("productModal");
    const content = document.getElementById("modalContent");

    content.innerHTML=`
        <img src="${p.img}" style="width:100%; height:300px; object-fit:cover;">
        <div style="padding:25px;">
            <h2>${p.title}</h2>
            <p style="margin:15px 0; color:#cbd5e1;">${p.desc}</p>
            <div style="font-size:1.5rem; font-weight:800; color:var(--primary); margin-bottom:20px;">π ${p.price}</div>
            <button class="btn-pay" onclick="buyNow(${p.id}, ${p.price})">شراء الآن باستخدام Pi</button>
        </div>
    `;
    modal.style.display="flex";
}

function closeModal(){
    document.getElementById("productModal").style.display="none";
    document.body.style.overflow="auto";
}

// الدفع
async function buyNow(productId, amount){
    if(!currentUser){ showToast("يرجى تسجيل الدخول عبر Pi أولاً"); login(); return; }

    try{
        const payment = await window.Pi.createPayment({
            amount: parseFloat(amount),
            memo:`طلب رقم #${productId} من Fair`,
            metadata:{productId}
        },{
            onReadyForServerApproval: async(paymentId)=>{
                showToast("جاري تأكيد الدفع مع السيرفر...");
                console.log("Approval Needed for:", paymentId);
                // استدعاء ملف approve.js
                approvePayment(paymentId);
            },
            onReadyForServerCompletion: async(paymentId, txid)=>{
                showToast("✅ تم الدفع بنجاح! رقم المعاملة: " + txid.substring(0,8));
                console.log("Completion Needed. TXID:", txid);
                closeModal();
                // استدعاء ملف complete.js
                completePayment(paymentId, txid);
            },
            onCancel: ()=> showToast("تم إلغاء المعاملة"),
            onError: ()=> showToast("حدث خطأ في الدفع")
        });
    } catch(err){ console.error(err); showToast("فشل بدء عملية الدفع"); }
}

// تسجيل الدخول والخروج
async function login(){
    try{
        const auth = await window.Pi.authenticate(['username']);
        currentUser = auth.user;
        document.getElementById("userProfile").innerHTML=`
            <span style="font-weight:bold;">${currentUser.username}</span>
            <button onclick="logout()" style="margin-left:10px; background:#ef4444; border:none; padding:5px 12px; border-radius:8px; color:white; cursor:pointer;">خروج</button>
        `;
        showToast(`أهلاً بك ${currentUser.username}`);
    } catch(e){ console.error(e); }
}

function logout(){
    currentUser=null;
    document.getElementById("userProfile").innerHTML=`<button id="loginBtn" onclick="login()" style="background:var(--primary); border:none; padding:8px 20px; border-radius:10px; font-weight:700; cursor:pointer;">دخول</button>`;
    showToast("تم تسجيل الخروج");
}

// البحث
function search(query){
    const filtered = products.filter(p=>p.title.toLowerCase().includes(query.toLowerCase()));
    render(filtered);
    showToast(`تم العثور على ${filtered.length} منتج/منتجات`);
}

// Toast
function showToast(msg){
    const t=document.getElementById("toast");
    t.textContent=msg;
    t.style.display="block";
    setTimeout(()=>t.style.display="none",4000);
}

// بدء التطبيق
window.onload = ()=>{
    initPi();
    render(products);
};
</script>
</body>
    </html>٩
