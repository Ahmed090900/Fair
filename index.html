<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fair</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "Cairo", sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
}

header {
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.4);
}

.logo {
  font-size: 22px;
  font-weight: bold;
  background: linear-gradient(45deg, #facc15, #eab308);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

button {
  background: linear-gradient(45deg, #facc15, #eab308);
  border: none;
  padding: 10px 15px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

.container {
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
}

.card {
  background: rgba(30, 41, 59, 0.6);
  border-radius: 20px;
  overflow: hidden;
  backdrop-filter: blur(12px);
  transition: 0.4s;
  transform: translateY(20px);
  opacity: 0;
  animation: fadeUp 0.6s forwards;
}

.card:hover {
  transform: translateY(-10px) scale(1.02);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.card img {
  width: 100%;
  height: 170px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
}

.category {
  font-size: 12px;
  opacity: 0.7;
}

.price {
  color: #facc15;
  font-size: 18px;
  margin: 8px 0;
}

@keyframes fadeUp {
  to {
    transform: translateY(0);
    opacity: 1;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">✨ Fair</div>
  <button onclick="login()">تسجيل الدخول</button>
</header>

<div class="container">
  <h3>أفضل العروض 🏠🚗</h3>
  <div class="grid" id="products"></div>
</div>

<script>

let user = null;

window.Pi.init({
  version: "2.0",
  sandbox: false
});

async function login() {
  const scopes = ['username', 'payments'];

  const auth = await window.Pi.authenticate(scopes, function(payment) {
    console.log(payment);
  });

  user = auth.user;
  alert("أهلاً " + user.username + " في Fair ❤️");
}

const products = [
  {
    id: "car1",
    title: "BMW X5 2022",
    price: 2,
    type: "🚗 سيارة",
    img: "https://images.unsplash.com/photo-1555215695-3004980ad54e"
  },
  {
    id: "car2",
    title: "Mercedes C300 2021",
    price: 1.5,
    type: "🚗 سيارة",
    img: "https://images.unsplash.com/photo-1619767886558-efdc259cde1a"
  },
  {
    id: "home1",
    title: "شقة فاخرة 150م بالقاهرة",
    price: 3,
    type: "🏠 عقار",
    img: "https://images.unsplash.com/photo-1568605114967-8130f3a36994"
  },
  {
    id: "home2",
    title: "فيلا مودرن بحمام سباحة",
    price: 5,
    type: "🏠 عقار",
    img: "https://images.unsplash.com/photo-1613977257363-707ba9348227"
  }
];

function renderProducts() {
  const container = document.getElementById("products");

  products.forEach((p, index) => {
    const el = document.createElement("div");
    el.className = "card";
    el.style.animationDelay = index * 0.1 + "s";

    el.innerHTML = `
      <img src="${p.img}" />
      <div class="card-content">
        <div class="category">${p.type}</div>
        <h3>${p.title}</h3>
        <div class="price">π ${p.price}</div>
        <button onclick="pay('${p.id}', ${p.price})">شراء الآن</button>
      </div>
    `;

    container.appendChild(el);
  });
}

renderProducts();

async function pay(productId, amount) {

  if (!user) {
    alert("سجل دخول الأول");
    return;
  }

  const paymentData = {
    amount: amount,
    memo: "شراء من Fair: " + productId,
    metadata: { productId }
  };

  const callbacks = {

    onReadyForServerApproval: function(paymentId) {
      fetch("/api/approve", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ paymentId })
      });
    },

    onReadyForServerCompletion: function(paymentId, txid) {
      fetch("/api/complete", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ paymentId, txid })
      });

      alert("✅ تم الدفع بنجاح عبر Fair");
    },

    onCancel: function() {
      alert("❌ تم الإلغاء");
    },

    onError: function(err) {
      console.error(err);
      alert("⚠️ خطأ");
    }
  };

  await window.Pi.createPayment(paymentData, callbacks);
}

</script>

</body>
</html>
