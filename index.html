<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAIR</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>

body{
margin:0;
font-family:sans-serif;
background:#020617;
color:white;
}

/* HEADER */
.header{
padding:30px;
text-align:center;
font-size:28px;
font-weight:bold;
}

/* SEARCH */
.search-box{
padding:20px;
display:flex;
gap:10px;
}

.search-box input{
flex:1;
padding:15px;
border-radius:12px;
border:none;
}

.search-box button{
padding:15px;
border:none;
border-radius:12px;
background:#6366f1;
color:white;
}

/* RESULTS */
.results{
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
}

/* CARD */
.card{
background:#0f172a;
padding:20px;
border-radius:15px;
transition:0.3s;
}

.card:hover{
transform:scale(1.02);
}

.price{
color:#22c55e;
font-size:18px;
}

.best{
background:#22c55e;
padding:4px 8px;
border-radius:6px;
font-size:12px;
margin-left:5px;
}

/* BUTTON */
.pay-btn{
margin-top:10px;
padding:10px;
border:none;
border-radius:10px;
background:#4f46e5;
color:white;
width:100%;
}

/* STATUS */
.status{
text-align:center;
margin-top:10px;
color:#22c55e;
}

.loading{
text-align:center;
margin-top:20px;
}

</style>
</head>

<body>

<div class="header">🔥 FAIR</div>

<div class="search-box">
<input id="search" placeholder="Search anything...">
<button onclick="search()">Search</button>
</div>

<div id="results" class="results"></div>

<div id="status" class="status"></div>

<script>

Pi.init({ version: "2.0" });

/* SEARCH */
function search(){

let results = document.getElementById("results");
results.innerHTML = "<div class='loading'>Searching...</div>";

setTimeout(()=>{

let data = [
{name:"Flight Cairo → Dubai",price:120},
{name:"Hotel Marina",price:80},
{name:"BMW Rental",price:70}
];

let best = Math.min(...data.map(x=>x.price));

results.innerHTML = "";

data.forEach(item=>{

results.innerHTML += `
<div class="card">
<h3>${item.name}</h3>
<div class="price">
$${item.price}
${item.price===best?'<span class="best">BEST</span>':''}
</div>
<button class="pay-btn" onclick="pay('${item.name}',${item.price})">
Pay with Pi
</button>
</div>
`;

});

},1000);

}

/* PAYMENT */
function pay(name,price){

let status = document.getElementById("status");
status.innerHTML = "⏳ Processing payment...";

const paymentData = {
amount:1,
memo:name,
metadata:{product:name}
};

const callbacks = {

/* APPROVE */
onReadyForServerApproval: async function(paymentId){

try{
const res = await fetch("/api/approve",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({paymentId})
});

const data = await res.json();

if(!data){
throw new Error("Approve failed");
}

}catch(e){
status.innerHTML = "❌ Approval failed";
throw e;
}

},

/* COMPLETE */
onReadyForServerCompletion: async function(paymentId,txid){

try{
const res = await fetch("/api/complete",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({paymentId,txid})
});

const data = await res.json();

if(!data){
throw new Error("Complete failed");
}

status.innerHTML = "✅ Payment Successful";

}catch(e){
status.innerHTML = "❌ Payment failed";
throw e;
}

},

onCancel: function(){
status.innerHTML = "⚠️ Payment cancelled";
},

onError: function(error){
console.error(error);
status.innerHTML = "❌ Error occurred";
}

};

Pi.createPayment(paymentData,callbacks);

}

</script>

</body>
</html>
