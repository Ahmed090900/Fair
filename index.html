<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAIR - Pi Deals</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
body, html{margin:0;padding:0;font-family:Arial;background:#020617;color:white}
.header{padding:20px;text-align:center;font-size:28px;font-weight:bold}
.hero{text-align:center;padding:30px}
.search-box{display:flex;justify-content:center;gap:10px;margin:20px}
.search-box input{padding:12px;width:60%;border-radius:10px;border:none}
.search-box button{padding:12px 20px;border:none;border-radius:10px;background:#6366f1;color:white;cursor:pointer}
.categories{display:flex;overflow-x:auto;gap:10px;padding:10px 20px}
.cat{padding:8px 12px;background:#0f172a;border-radius:20px;cursor:pointer;transition:0.3s}
.cat:hover{background:#6366f1}
.cards{display:flex;overflow-x:auto;gap:15px;padding:20px}
.card{min-width:220px;background:#0f172a;border-radius:15px;overflow:hidden;transition:0.3s;cursor:pointer}
.card:hover{transform:scale(1.05)}
.card img{width:100%;height:140px;object-fit:cover}
.card-body{padding:10px}
.price{color:#22c55e;font-weight:bold;margin-top:5px}
button.pay{width:100%;padding:10px;border:none;background:#4f46e5;color:white;border-radius:10px;cursor:pointer}
.status{text-align:center;margin:15px;color:#22c55e}
</style>
</head>
<body>
<div class="header">🔥 FAIR</div>
<div class="hero">
<h1>Compare Prices. Pay in Pi</h1>
<p>Hotels, Flights, Cars, Restaurants, Products</p>
<div class="search-box">
<input id="search" placeholder="Search deals...">
<button onclick="search()">Search</button>
</div>
</div>

<div class="categories">
<div class="cat" onclick="filterCategory('Hotels')">🏨 Hotels</div>
<div class="cat" onclick="filterCategory('Flights')">✈️ Flights</div>
<div class="cat" onclick="filterCategory('Cars')">🚗 Cars</div>
<div class="cat" onclick="filterCategory('Restaurants')">🍔 Restaurants</div>
<div class="cat" onclick="filterCategory('Products')">🛍️ Products</div>
</div>

<div class="cards" id="results"></div>
<div id="status" class="status"></div>

<script>
Pi.init({ version: "2.0" });

// تحويل الدولار إلى Pi
const USD_TO_PI = 0.01;

// بيانات العروض
const data = [
{name:"Dubai Hotel",priceUSD:80,category:"Hotels",img:"https://images.unsplash.com/photo-1501117716987-c8e1ecb2108e"},
{name:"Flight Cairo → Dubai",priceUSD:120,category:"Flights",img:"https://images.unsplash.com/photo-1549924231-f129b911e442"},
{name:"BMW Rental",priceUSD:70,category:"Cars",img:"https://images.unsplash.com/photo-1503376780353-7e6692767b70"},
{name:"Dinner Offer",priceUSD:25,category:"Restaurants",img:"https://images.unsplash.com/photo-1555992336-03a23c6c1e7b"},
{name:"iPhone Deal",priceUSD:900,category:"Products",img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"}
];

let currentData = [...data];

function renderCards(list){
const results = document.getElementById("results");
results.innerHTML = "";
let bestPricePi = Math.min(...list.map(x=>x.priceUSD*USD_TO_PI));
list.forEach(item=>{
let pricePi = (item.priceUSD*USD_TO_PI).toFixed(2);
results.innerHTML += `
<div class="card">
<img src="${item.img}">
<div class="card-body">
<h4>${item.name}</h4>
<p class="price">${pricePi} Pi ${pricePi==bestPricePi?'<span class="best">BEST</span>':''}</p>
<button class="pay" onclick="pay('${item.name}',${pricePi})">Pay with Pi</button>
</div>
</div>
`;
});
}

function filterCategory(cat){
currentData = data.filter(x=>x.category==cat);
renderCards(currentData);
}

function search(){
let query = document.getElementById("search").value.toLowerCase();
currentData = data.filter(x=>x.name.toLowerCase().includes(query));
renderCards(currentData);
}

// دالة الدفع
function pay(name, price){
const status = document.getElementById("status");
status.innerHTML = "⏳ Processing payment...";
const paymentData = {amount:Number(price), memo:name, metadata:{product:name}};
const callbacks = {
onReadyForServerApproval: async(paymentId)=>{
await fetch("/api/approve",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({paymentId})});
},
onReadyForServerCompletion: async(paymentId, txid)=>{
await fetch("/api/complete",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({paymentId,txid})});
status.innerHTML = `✅ Paid ${price} Pi successfully`;
},
onCancel: ()=>status.innerHTML="⚠️ Payment cancelled",
onError: (e)=>status.innerHTML="❌ Payment error"
};
Pi.createPayment(paymentData, callbacks);
}

// INITIAL RENDER
renderCards(currentData);
</script>
</body>
</html>
