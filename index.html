<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fair - منصة التجارة العادلة</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #facc15;
            --dark: #020617;
            --card: #1e293b;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f172a, #020617);
            color: white;
            min-height: 100vh;
        }

        #splash {
            position: fixed;
            inset: 0;
            background: var(--dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            font-size: 52px;
            font-weight: 700;
            color: var(--primary);
            gap: 15px;
            transition: opacity 0.9s ease;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(2,6,23,0.95);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { color: var(--primary); font-size: 28px; font-weight: 700; }

        .filters {
            padding: 15px 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        input {
            flex: 1;
            min-width: 220px;
            padding: 14px 18px;
            border-radius: 14px;
            border: none;
            background: #334155;
            color: white;
            font-size: 16px;
        }

        button {
            padding: 13px 22px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary { background: var(--primary); color: #000; }
        .btn-secondary { background: #334155; color: white; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 22px;
            padding: 10px 20px 40px;
        }

        .card {
            background: var(--card);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s ease;
            position: relative;
            cursor: pointer;
        }

        .card:hover { transform: translateY(-12px); box-shadow: 0 20px 35px rgba(250,204,21,0.25); }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .content { padding: 16px; }

        .price {
            color: var(--primary);
            font-size: 24px;
            font-weight: 700;
        }

        .favorite {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.6);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            z-index: 10;
        }

        /* Modal */
        #productModal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 15px;
        }

        .modal-content {
            background: #1e293b;
            max-width: 980px;
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.7);
        }

        .modal-header {
            padding: 20px 25px;
            background: #0f172a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body {
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        @media (min-width: 768px) {
            .modal-body { flex-direction: row; }
        }

        .modal-price { font-size: 34px; color: var(--primary); font-weight: 700; }

        .comparison {
            background: #0f172a;
            padding: 20px;
            border-radius: 16px;
            margin-top: 20px;
        }

        .compare-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
        }

        .compare-card {
            background: #1e293b;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
        }

        .best { border: 2px solid #22c55e; }

        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #22c55e;
            color: #000;
            padding: 15px 28px;
            border-radius: 14px;
            font-weight: 700;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            display: none;
            z-index: 3000;
        }
    </style>
</head>
<body>

    <div id="splash">
        ✨ Fair
        <span style="font-size:22px;opacity:0.9;">منصة التجارة العادلة بـ Pi</span>
    </div>

    <header>
        <div class="logo">Fair</div>
        <div>
            <button id="loginBtn" class="btn-primary" onclick="login()">تسجيل الدخول</button>
            <button id="logoutBtn" class="btn-secondary" onclick="logout()" style="display:none;">تسجيل خروج</button>
        </div>
    </header>

    <div class="filters">
        <input type="text" id="searchInput" placeholder="ابحث عن أي شيء..." onkeyup="search(this.value)">
        
        <button class="btn-secondary" onclick="filter('all')">الكل</button>
        <button class="btn-secondary" onclick="filter('car')">سيارات</button>
        <button class="btn-secondary" onclick="filter('home')">عقارات</button>
        <button class="btn-secondary" onclick="filter('phone')">جوال</button>
    </div>

    <div class="grid" id="products"></div>

    <!-- Modal -->
    <div id="productModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle"></h3>
                <button onclick="closeModal()" style="background:none;border:none;color:#fff;font-size:32px;cursor:pointer;">×</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <div id="toast"></div>

<script>
// ==================== Pi SDK ====================
async function initPi() {
    if (typeof window.Pi === "undefined") {
        console.error("Pi SDK لم يتم تحميله");
        return;
    }
    try {
        await window.Pi.init({ version: "2.0", sandbox: true }); // غيّر إلى false عند النشر النهائي
        console.log("Pi SDK تم تهيئته بنجاح");
    } catch (e) {
        console.error("خطأ في تهيئة Pi SDK:", e);
    }
}

// ==================== Data ====================
let currentUser = null;
let favorites = JSON.parse(localStorage.getItem("fair_favorites")) || [];

let allProducts = [ /* بيانات المنتجات كما هي (لم أغيرها) */ 
    {
        id: 1, type: "car", title: "BMW X5 2022", price: 2.8,
        img: "https://images.unsplash.com/photo-1555215695-3004980ad54e",
        description: "سيارة BMW X5 موديل 2022 بحالة ممتازة، كيلومترات منخفضة، داخلية فاخرة، كاميرات 360°.",
        location: "مسقط - السيب", condition: "ممتازة",
        comparisons: [
            {platform: "Fair", price: 2.8, best: true},
            {platform: "OpenSooq", price: 3.4},
            {platform: "Dubizzle", price: 3.1}
        ]
    },
    // ... (باقي المنتجات كما في الكود الأصلي)
    {
        id: 2, type: "car", title: "Mercedes C300 2023", price: 3.2,
        img: "https://images.unsplash.com/photo-1619767886558-efdc259cde1a",
        description: "مرسيدس C300 موديل 2023 شبه جديدة، لون أسود، تقنيات حديثة جداً.",
        location: "مسقط - القرم", condition: "شبه جديدة",
        comparisons: [{platform: "Fair", price: 3.2, best: true}, {platform: "OpenSooq", price: 3.9}]
    },
    {
        id: 3, type: "home", title: "شقة فاخرة 150م²", price: 4.5,
        img: "https://images.unsplash.com/photo-1568605114967-8130f3a36994",
        description: "شقة فاخرة في الخوير، 3 غرف، إطلالة رائعة، موقف خاص.",
        location: "مسقط - الخوير", condition: "جديدة",
        comparisons: [{platform: "Fair", price: 4.5, best: true}, {platform: "OpenSooq", price: 5.2}]
    },
    {
        id: 4, type: "home", title: "فيلا مودرن 4 غرف", price: 8.7,
        img: "https://images.unsplash.com/photo-1613977257363-707ba9348227",
        description: "فيلا فاخرة مع حديقة ومسبح في المعبيلة.",
        location: "السيب - المعبيلة", condition: "ممتازة",
        comparisons: [{platform: "Fair", price: 8.7, best: true}, {platform: "Dubizzle", price: 9.5}]
    },
    {
        id: 5, type: "phone", title: "iPhone 16 Pro Max 256GB", price: 1.1,
        img: "https://images.unsplash.com/photo-1724177807530-0c2c8c8c8c8c",
        description: "آيفون 16 برو ماكس جديد بالكامل، ضمان سنة.",
        location: "مسقط", condition: "جديد",
        comparisons: [{platform: "Fair", price: 1.1, best: true}, {platform: "OpenSooq", price: 1.4}]
    }
];

// ==================== Render Products ====================
function renderProducts(list) {
    const container = document.getElementById("products");
    container.innerHTML = "";

    list.forEach(p => {
        const isFav = favorites.includes(p.id);
        const cardHTML = `
            <div class="card" onclick="showProduct(${p.id})">
                <div class="favorite" onclick="event.stopImmediatePropagation(); toggleFavorite(${p.id});">
                    ${isFav ? '❤️' : '♡'}
                </div>
                <img src="${p.img}" onerror="this.src='https://via.placeholder.com/300x200/1e293b/fff?text=Fair'">
                <div class="content">
                    <h4>${p.title}</h4>
                    <div class="price">π ${p.price}</div>
                    <button class="btn-primary" style="width:100%;margin-top:12px;">عرض التفاصيل + مقارنة</button>
                </div>
            </div>`;
        container.innerHTML += cardHTML;
    });

    if (list.length === 0) {
        container.innerHTML = `<p style="grid-column:1/-1;text-align:center;padding:60px;color:#94a3b8;font-size:18px;">لا توجد نتائج مطابقة</p>`;
    }
}

// ==================== Favorites ====================
function toggleFavorite(id) {
    event.stopImmediatePropagation();
    if (favorites.includes(id)) {
        favorites = favorites.filter(f => f !== id);
    } else {
        favorites.push(id);
    }
    localStorage.setItem("fair_favorites", JSON.stringify(favorites));
    renderProducts(allProducts); // إعادة رسم الكل
}

function showProduct(id) {
    const product = allProducts.find(p => p.id === id);
    if (!product) return;

    const modal = document.getElementById("productModal");
    const body = document.getElementById("modalBody");
    const titleEl = document.getElementById("modalTitle");

    titleEl.textContent = product.title;

    let compareHTML = `<div class="comparison"><h3>🔍 مقارنة الأسعار عبر المنصات</h3><div class="compare-grid">`;
    
    product.comparisons.forEach(c => {
        compareHTML += `
            <div class="compare-card ${c.best ? 'best' : ''}">
                <div class="platform">${c.platform}</div>
                <div class="price">π ${c.price}</div>
                ${c.best ? '<small style="color:#22c55e">أفضل سعر</small>' : ''}
            </div>`;
    });
    compareHTML += `</div></div>`;

    body.innerHTML = `
        <div style="flex:1;">
            <img src="${product.img}" style="width:100%;border-radius:18px;height:320px;object-fit:cover;">
        </div>
        <div style="flex:1;display:flex;flex-direction:column;">
            <h2>${product.title}</h2>
            <div class="modal-price">π ${product.price}</div>
            <p><strong>الموقع:</strong> ${product.location}</p>
            <p><strong>الحالة:</strong> ${product.condition}</p>
            <p style="line-height:1.7;margin:15px 0;">${product.description}</p>
            ${compareHTML}
            <button onclick="buyProduct(${product.id}, ${product.price}); closeModal();" 
                    class="btn-primary" style="margin-top:auto;padding:18px;font-size:18px;">
                شراء الآن بـ π ${product.price}
            </button>
        </div>
    `;

    modal.style.display = "flex";
}

function closeModal() {
    document.getElementById("productModal").style.display = "none";
}

// ==================== Search & Filter ====================
function search(q) {
    const filtered = allProducts.filter(p => 
        p.title.toLowerCase().includes(q.toLowerCase())
    );
    renderProducts(filtered);
}

function filter(type) {
    if (type === "all") {
        renderProducts(allProducts);
    } else {
        renderProducts(allProducts.filter(p => p.type === type));
    }
}

// ==================== Pi Authentication & Payment ====================
async function login() {
    if (typeof window.Pi === "undefined") {
        toast("Pi SDK غير متوفر. تأكد من فتح الموقع داخل Pi Browser");
        return;
    }

    try {
        const scopes = ["username"];
        const auth = await window.Pi.authenticate(scopes, async (payment) => {
            // يمكنك إضافة منطق إضافي هنا
        });
        
        currentUser = auth.user;
        document.getElementById("loginBtn").style.display = "none";
        document.getElementById("logoutBtn").style.display = "inline-block";
        toast(`مرحباً ${currentUser.username || 'بالمستخدم'} 👋`);
    } catch (err) {
        console.error(err);
        toast("فشل تسجيل الدخول");
    }
}

function logout() {
    currentUser = null;
    document.getElementById("loginBtn").style.display = "inline-block";
    document.getElementById("logoutBtn").style.display = "none";
    toast("تم تسجيل الخروج");
}

async function buyProduct(id, amount) {
    if (!currentUser) {
        toast("يجب تسجيل الدخول أولاً");
        login();
        return;
    }

    if (typeof window.Pi === "undefined") {
        toast("Pi SDK غير متوفر");
        return;
    }

    try {
        const paymentData = {
            amount: amount,
            memo: `شراء منتج #${id} من Fair`,
            metadata: { productId: id }
        };

        const payment = await window.Pi.createPayment(paymentData);
        
        // هنا يمكنك إرسال payment.paymentId إلى الباك إند للتحقق
        toast(`تم إنشاء عملية الدفع بنجاح! (π ${amount})`);
        console.log("Payment created:", payment);
        
    } catch (err) {
        console.error(err);
        toast("فشل في عملية الدفع");
    }
}

function toast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.style.display = "block";
    setTimeout(() => { t.style.display = "none"; }, 3000);
}

// ==================== Init ====================
window.onload = async () => {
    // إخفاء Splash
    setTimeout(() => {
        const splash = document.getElementById("splash");
        splash.style.opacity = "0";
        setTimeout(() => splash.style.display = "none", 900);
    }, 1300);

    await initPi();
    renderProducts(allProducts);
};
</script>
</body>
</html>
