<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pi Market</title>

  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    body {
      margin: 0;
      font-family: "Cairo", sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #020617;
      border-bottom: 1px solid #1e293b;
    }

    button {
      background: #facc15;
      border: none;
      padding: 10px 15px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 15px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .price {
      color: #facc15;
      font-size: 18px;
      margin: 10px 0;
    }

    .category {
      opacity: 0.7;
      font-size: 12px;
    }
  </style>
</head>

<body>

<header>
  <h2>🚀 Pi Market</h2>
  <button onclick="login()">تسجيل الدخول</button>
</header>

<div class="container">

  <h3>🏠 عقارات & 🚗 سيارات</h3>

  <div class="grid" id="products"></div>

</div>

<script>
  let user = null;

  // 🔐 INIT
  window.Pi.init({
    version: "2.0",
    sandbox: false
  });

  // 👤 LOGIN
  async function login() {
    try {
      const scopes = ['username', 'payments'];

      const auth = await window.Pi.authenticate(scopes, function(payment) {
        console.log("Incomplete:", payment);
      });

      user = auth.user;
      alert("تم تسجيل الدخول: " + user.username);

    } catch (err) {
      console.error(err);
    }
  }

  // 🛍️ PRODUCTS
  const products = [
    {
      id: "car1",
      title: "BMW 2020",
      price: 2,
      type: "🚗 سيارة"
    },
    {
      id: "car2",
      title: "Mercedes 2019",
      price: 1.5,
      type: "🚗 سيارة"
    },
    {
      id: "home1",
      title: "شقة 120م",
      price: 3,
      type: "🏠 عقار"
    },
    {
      id: "home2",
      title: "فيلا فاخرة",
      price: 5,
      type: "🏠 عقار"
    }
  ];

  // 📦 RENDER
  function renderProducts() {
    const container = document.getElementById("products");

    products.forEach(p => {
      const el = document.createElement("div");
      el.className = "card";

      el.innerHTML = `
        <div class="category">${p.type}</div>
        <h3>${p.title}</h3>
        <div class="price">π ${p.price}</div>
        <button onclick="pay('${p.id}', ${p.price})">شراء الآن</button>
      `;

      container.appendChild(el);
    });
  }

  renderProducts();

  // 💳 PAYMENT
  async function pay(productId, amount) {

    if (!user) {
      alert("سجل دخول الأول");
      return;
    }

    try {

      const paymentData = {
        amount: amount,
        memo: "شراء منتج: " + productId,
        metadata: { productId }
      };

      const callbacks = {

        onReadyForServerApproval: function(paymentId) {
          fetch("/api/approve", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ paymentId })
          });
        },

        onReadyForServerCompletion: function(paymentId, txid) {
          fetch("/api/complete", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ paymentId, txid })
          });

          alert("✅ تم الدفع بنجاح");
        },

        onCancel: function(paymentId) {
          alert("❌ تم إلغاء العملية");
        },

        onError: function(error) {
          console.error(error);
          alert("⚠️ حصل خطأ");
        }
      };

      await window.Pi.createPayment(paymentData, callbacks);

    } catch (err) {
      console.error(err);
    }
  }

</script>

</body>
</html>
