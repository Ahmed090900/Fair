<script>
    // --- State Manager ---
    const app = {
        state: {
            user: { username: 'Alex.Pi', balance: 1240.85, points: 2450, level: 'Bronze' },
            isPremium: false,
            currentView: 'home',
            history: [],
            deals: [],
            isLoading: false,
            currentCategory: 'All',
            searchTerm: ''
        },

        init() {
            const saved = localStorage.getItem('fair_state_v2');
            if (saved) {
                const parsed = JSON.parse(saved);
                this.state.user = parsed.user || this.state.user;
                this.state.isPremium = parsed.isPremium || false;
                this.state.history = parsed.history || [];
            }
            
            this.initPi();
            this.fetchData();
            this.switchView('home');
        },

        async fetchData() {
            this.state.isLoading = true;
            this.renderView(this.state.currentView);

            try {
                // Fetch real products
                const productRes = await fetch('https://fakestoreapi.com/products');
                const products = await productRes.json();
                
                // Map products to internal format
                const formattedProducts = products.map(p => ({
                    id: `p-${p.id}`,
                    category: 'Products',
                    name: p.title,
                    price: parseFloat((p.price / 10).toFixed(2)), // Convert to Pi-scale
                    oldPrice: parseFloat((p.price / 10 * 1.5).toFixed(2)),
                    rating: p.rating.rate,
                    brand: 'Marketplace',
                    image: p.image,
                    premium: p.rating.rate > 4.5
                }));

                // Mock Fetch for other categories
                const mockServices = await this.mockFetchServices();

                this.state.deals = [...formattedProducts, ...mockServices];
                this.state.isLoading = false;
                this.renderView(this.state.currentView);
            } catch (err) {
                console.error("Data fetch failed", err);
                this.state.isLoading = false;
                this.showToast("Connection error. Using cache.", true);
            }
        },

        async mockFetchServices() {
            return new Promise((resolve) => {
                setTimeout(() => {
                    resolve([
                        { id: 'f-1', category: 'Flights', name: 'First Class: Dubai to Tokyo', price: 45.20, rating: 5.0, brand: 'Emirates Pi', bestDeal: true, image: 'https://images.unsplash.com/photo-1436491865332-7a61a109c0f3?auto=format&fit=crop&w=800&q=80' },
                        { id: 'h-1', category: 'Hotels', name: 'Viceroy Bali Resort (3N)', price: 112.00, oldPrice: 250.00, rating: 4.9, brand: 'Luxury Retreats', image: 'https://images.unsplash.com/photo-1571896349842-33c89424de2d?auto=format&fit=crop&w=800&q=80' },
                        { id: 'c-1', category: 'Cars', name: 'Tesla Model S Plaid 2024', price: 890.00, rating: 4.9, brand: 'Tesla Connect', image: 'https://images.unsplash.com/photo-1617788138017-80ad40651399?auto=format&fit=crop&w=800&q=80' },
                        { id: 'f-2', category: 'Flights', name: 'Economy: London to New York', price: 8.50, rating: 4.2, brand: 'Virgin Atlantic', image: 'https://images.unsplash.com/photo-1542296332-2e4473faf563?auto=format&fit=crop&w=800&q=80' }
                    ]);
                }, 800);
            });
        },

        save() {
            localStorage.setItem('fair_state_v2', JSON.stringify({
                user: this.state.user,
                isPremium: this.state.isPremium,
                history: this.state.history
            }));
        },

        async initPi() {
            try {
                const Pi = window.Pi;
                if (Pi) {
                    await Pi.init({ version: "2.0", sandbox: true });
                    const scopes = ['username', 'payments'];
                    const onIncompletePaymentFound = (payment) => {};
                    const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                    if (auth) {
                        this.state.user.username = auth.user.username;
                        this.save();
                    }
                }
            } catch (err) {
                console.warn("Pi SDK init failed");
            }
        },

        showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            const message = document.getElementById('toast-message');
            message.innerText = msg;
            toast.classList.remove('opacity-0', 'translate-y-[-20px]', 'pointer-events-none');
            toast.classList.add('opacity-100', 'translate-y-0');
            if (isError) toast.classList.add('border-error/40'); else toast.classList.remove('border-error/40');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-[-20px]', 'pointer-events-none');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 3000);
        },

        async buyItem(itemId, amount) {
            this.showToast(`Paying ${amount} π...`);
            try {
                const Pi = window.Pi;
                if (!Pi) throw new Error("No SDK");
                // Pi SDK Payment Logic (Mocked approval for this demo context)
                this.processPurchase(itemId, amount);
            } catch (err) {
                this.processPurchase(itemId, amount);
            }
        },

        processPurchase(itemId, amount) {
            this.state.user.balance -= amount;
            this.state.user.points += Math.round(amount * 10);
            this.state.history.push({ date: new Date().toLocaleDateString(), item: itemId, amount });
            this.updateLevel();
            this.save();
            this.showToast("Success! Item secured in Vault.");
            this.switchView('home');
        },

        upgradePremium() {
            if (this.state.isPremium) return this.showToast("Already Premium!");
            this.state.isPremium = true;
            this.state.user.balance -= 1.0;
            this.save();
            this.showToast("Premium features unlocked!");
            this.switchView('profile');
        },

        updateLevel() {
            const p = this.state.user.points;
            if (p > 10000) this.state.user.level = 'Diamond';
            else if (p > 5000) this.state.user.level = 'Platinum';
            else if (p > 2000) this.state.user.level = 'Gold';
            else this.state.user.level = 'Bronze';
        },

        switchView(viewId) {
            const container = document.getElementById('app-content');
            container.style.opacity = '0';
            setTimeout(() => {
                this.state.currentView = viewId;
                this.renderView(viewId);
                this.updateNav(viewId);
                container.style.opacity = '1';
                window.scrollTo(0,0);
            }, 200);
        },

        updateNav(viewId) {
            document.querySelectorAll('.nav-item').forEach(el => {
                const v = el.getAttribute('data-view');
                if (v === viewId) {
                    el.classList.add('bg-gradient-to-br', 'from-primary/20', 'to-secondary/20', 'text-[#dee5ff]', 'rounded-[1.5rem]', 'shadow-[inset_0_1px_1px_rgba(255,255,255,0.1)]');
                    el.classList.remove('text-[#40485d]');
                    el.querySelector('.material-symbols-outlined').style.fontVariationSettings = "'FILL' 1";
                } else {
                    el.classList.remove('bg-gradient-to-br', 'from-primary/20', 'to-secondary/20', 'text-[#dee5ff]', 'rounded-[1.5rem]', 'shadow-[inset_0_1px_1px_rgba(255,255,255,0.1)]');
                    el.classList.add('text-[#40485d]');
                    el.querySelector('.material-symbols-outlined').style.fontVariationSettings = "'FILL' 0";
                }
            });
        },

        renderSkeleton() {
            return `
                <div class="space-y-8 animate-pulse">
                    <div class="h-48 w-full glass-card rounded-3xl shimmer"></div>
                    <div class="flex gap-4 overflow-hidden">
                        <div class="min-w-[280px] h-[360px] glass-card rounded-3xl shimmer"></div>
                        <div class="min-w-[280px] h-[360px] glass-card rounded-3xl shimmer"></div>
                    </div>
                </div>
            `;
        },

        renderView(viewId) {
            const container = document.getElementById('app-content');
            if (this.state.isLoading && (viewId === 'home' || viewId === 'search')) {
                container.innerHTML = this.renderSkeleton();
                return;
            }

            if (viewId === 'home') {
                const recommended = this.state.deals.slice(0, 4);
                const trending = this.state.deals.slice(4, 7);

                container.innerHTML = `
                    <section class="relative">
                        <div class="glass-card p-8 rounded-3xl border-t border-white/10 shadow-2xl relative overflow-hidden group">
                            <div class="absolute -top-24 -right-24 w-64 h-64 bg-primary/20 rounded-full blur-[80px]"></div>
                            <div class="flex justify-between items-start relative z-10">
                                <div>
                                    <span class="font-label text-xs uppercase tracking-[0.2em] text-on-surface-variant font-semibold">Current Portfolio</span>
                                    <div class="flex items-baseline gap-2 mt-1">
                                        <span class="font-headline text-4xl font-bold tracking-tight">${this.state.user.balance.toFixed(2)}</span>
                                        <span class="font-headline text-xl text-primary font-bold">π</span>
                                    </div>
                                </div>
                                <div class="bg-surface-bright/50 px-4 py-2 rounded-2xl border border-outline-variant/20 flex items-center gap-2">
                                    <span class="material-symbols-outlined text-tertiary text-sm" style="font-variation-settings: 'FILL' 1;">workspace_premium</span>
                                    <span class="font-label text-xs font-bold text-on-surface">${this.state.user.level} Tier</span>
                                </div>
                            </div>
                            <div class="mt-8 flex gap-8 relative z-10">
                                <div><p class="text-[10px] uppercase tracking-widest text-on-surface-variant mb-1">Loyalty Points</p><p class="font-headline font-bold text-lg">${this.state.user.points} <span class="text-xs text-on-surface-variant font-normal">pts</span></p></div>
                                <div class="w-px h-10 bg-outline-variant/30"></div>
                                <div><p class="text-[10px] uppercase tracking-widest text-on-surface-variant mb-1">Growth</p><p class="font-headline font-bold text-lg text-primary">+12.4%</p></div>
                            </div>
                            <button class="mt-8 w-full py-4 rounded-2xl bg-gradient-to-r from-primary-dim to-secondary-dim text-on-primary font-headline font-bold text-sm tracking-wide shadow-lg shadow-primary/20 active:scale-[0.98] transition-all">View Transaction History</button>
                        </div>
                    </section>
                    <section>
                        <div class="flex justify-between items-end mb-6">
                            <div><span class="
