<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fair App</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background: radial-gradient(circle,#2e1a47,#1a1a2e);
    color:white;
}

/* Layout */
.container { max-width:420px; margin:auto; padding:20px; }
.card {
    background:rgba(255,255,255,0.07);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:20px;
    margin-top:20px;
}

/* Inputs */
input {
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}

/* Buttons */
.btn {
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#6200ea,#b388ff);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* Result */
.result {
    background:#222;
    padding:15px;
    border-radius:12px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- 🔐 LOGIN -->
<div id="login" class="card">
<h2>Fair 👋</h2>
<p>سجل الدخول</p>

<input id="username" placeholder="اسم المستخدم">
<button class="btn" onclick="login()">دخول</button>
</div>

<!-- 🏠 APP -->
<div id="app" style="display:none;">

<div class="card">
<h2>Fair 🔍</h2>

<input id="search" placeholder="ابحث عن منتج...">
<button class="btn" onclick="searchDeals()">بحث</button>

<div id="results"></div>
</div>

<!-- 👤 PROFILE -->
<div class="card">
<h3>👤 الملف الشخصي</h3>
<p id="userInfo"></p>
<p>💎 الحالة: <span id="premiumStatus">Free</span></p>

<button class="btn" onclick="connectPi()">ربط محفظة Pi</button>
<button class="btn" onclick="subscribe()">اشتراك Premium (1 Pi / شهر)</button>
</div>

</div>

</div>

<script>

// 🔐 Login
function login() {
    const user = document.getElementById("username").value;
    if (!user) return alert("ادخل اسم");

    localStorage.setItem("user", user);
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";

    loadUser();
}

// 👤 Load user
function loadUser() {
    const user = localStorage.getItem("user");
    const premium = localStorage.getItem("premium");

    document.getElementById("userInfo").innerText = "👋 مرحباً " + user;
    document.getElementById("premiumStatus").innerText = premium ? "Premium" : "Free";
}

// 🔎 Search (Demo)
function searchDeals() {
    const q = document.getElementById("search").value.toLowerCase();

    const data = [
        { name:"iPhone 13", price:1 },
        { name:"Samsung S22", price:0.9 },
        { name:"BMW X5", price:20 }
    ];

    const filtered = data.filter(x => x.name.toLowerCase().includes(q));

    const results = document.getElementById("results");

    if (!filtered.length) {
        results.innerHTML = "❌ لا يوجد نتائج";
        return;
    }

    filtered.sort((a,b)=>a.price-b.price);

    results.innerHTML = filtered.map((item,i)=>`
        <div class="result">
            <h3>${item.name}</h3>
            <p>${item.price} Pi ${i===0?"🔥 الأفضل":""}</p>
            <button class="btn" onclick="buy('${item.name}', ${item.price})">شراء</button>
        </div>
    `).join("");
}

// 💳 Connect Pi
async function connectPi() {
    if (!window.Pi) return alert("افتح داخل Pi Browser");

    Pi.init({ version:"2.0", sandbox:true });

    const auth = await Pi.authenticate(['username','payments']);
    alert("تم الربط: " + auth.user.username);
}

// 💰 Buy
async function buy(item, price) {
    await Pi.createPayment({
        amount: price,
        memo: "Buy " + item,
        metadata: { item }
    },{
        onReadyForServerApproval: (id) => {
            return fetch('/api/approve',{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({paymentId:id})
            });
        },
        onReadyForServerCompletion: (id,txid) => {
            return fetch('/api/complete',{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({paymentId:id,txid})
            });
        },
        onCancel: ()=>alert("تم الإلغاء"),
        onError: (e)=>alert(e.message)
    });

    alert("✅ تم الدفع");
}

// ⭐ Premium Subscription
async function subscribe() {
    await Pi.createPayment({
        amount:1,
        memo:"Fair Premium Subscription",
        metadata:{type:"premium"}
    },{
        onReadyForServerApproval:(id)=>fetch('/api/approve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({paymentId:id})}),
        onReadyForServerCompletion:(id,txid)=>fetch('/api/complete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({paymentId:id,txid})})
    });

    localStorage.setItem("premium", true);
    loadUser();
    alert("🔥 تم تفعيل Premium");
}

// Auto login
if (localStorage.getItem("user")) {
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    loadUser();
}

</script>

</body>
</html>
